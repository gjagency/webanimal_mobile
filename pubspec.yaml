name: mobile_app
description: "Webanimal mobile app"
publish_to: 'none'

version: 1.0.8+8

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  google_sign_in: ^6.2.1
  cupertino_icons: ^1.0.8
  go_router: ^17.0.1
  image_picker: ^1.2.1
  flutter_dotenv: ^6.0.0
  shared_preferences: ^2.5.4
  local_auth: ^3.0.0
  http: ^1.6.0
  flutter_secure_storage: ^10.0.0
  geocoding: ^2.0.5
  firebase_core: ^3.15.2
  geolocator: ^10.1.0
  url_launcher: ^6.1.12
  font_awesome_flutter: ^10.4.0
  intl: ^0.18.1
  share_plus: ^12.0.1
  app_links: ^7.0.0
  flutter_launcher_icons: ^0.14.4
  google_fonts: ^8.1.0
  video_player: ^2.9.2
  video_thumbnail: ^0.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"